
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 550" width="100%" height="100%">
      <defs>
        <linearGradient id="bgGrad_5510" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#0D47A1" />
          <stop offset="100%" stop-color="#000B21" />
        </linearGradient>
        
        <pattern id="grain_5510" width="100" height="100" patternUnits="userSpaceOnUse">
          <line x1="0" y1="10" x2="100" y2="10" stroke="#000" stroke-width="0.3" opacity="0.05" />
          <line x1="0" y1="35" x2="100" y2="35" stroke="#000" stroke-width="0.2" opacity="0.07" />
          <line x1="0" y1="65" x2="100" y2="65" stroke="#000" stroke-width="0.3" opacity="0.04" />
          <line x1="0" y1="88" x2="100" y2="88" stroke="#000" stroke-width="0.2" opacity="0.06" />
        </pattern>
      </defs>

      <!-- Outer Frame -->
      <rect x="0" y="0" width="400" height="550" fill="url(#bgGrad_5510)" stroke="#1A1A1A" stroke-width="10" rx="8" />
      
      <!-- Subtle Grain Layer -->
      <rect x="5" y="5" width="390" height="540" fill="url(#grain_5510)" rx="4" pointer-events="none" />
      
      <!-- Frame Stripes -->
      <g opacity="0.12">
        <line x1="30" y1="0" x2="30" y2="550" stroke="#FFF" stroke-width="2" />
        <line x1="370" y1="0" x2="370" y2="550" stroke="#FFF" stroke-width="2" />
        <line x1="200" y1="0" x2="200" y2="550" stroke="#FFF" stroke-width="2" stroke-dasharray="8,8" />
      </g>

      <!-- Border Frame inside Title -->
      <rect x="25" y="25" width="350" height="130" fill="none" stroke="#00E5FF" stroke-width="2.5" stroke-dasharray="5 5" opacity="0.6" rx="4" />

      <!-- Genre Decals -->
      
      <ellipse cx="200" cy="240" rx="100" ry="28" fill="none" stroke="#00E5FF" stroke-width="4" opacity="0.75" transform="rotate(-15, 200, 240)"/>
      <circle cx="290" cy="150" r="18" fill="#FFEB3B" />
      <ellipse cx="290" cy="150" rx="30" ry="4" fill="none" stroke="#FFEB3B" stroke-width="2" transform="rotate(10, 290, 150)"/>
      <!-- Tiny star circles -->
      <circle cx="60" cy="190" r="2.5" fill="#FFFFFF" />
      <circle cx="340" cy="260" r="3.5" fill="#00E5FF" />
      <circle cx="100" cy="110" r="1.5" fill="#FFFFFF" />
    

      <!-- Cylindrical Little People Peg Actor (Centered) -->
      <g id="peg-toy-graphic" transform="translate(0, 50)">
        <!-- Cylinder stand pad -->
        <ellipse cx="200" cy="412" rx="55" ry="12" fill="#111" stroke="#333" stroke-width="2" opacity="0.5" />
        <ellipse cx="200" cy="410" rx="50" ry="10" fill="#FAF6E8" stroke="#1A1A1A" stroke-width="3.5" />
        
        <!-- Plastic body cylinder -->
        <path d="M 176,410 L 182,332 L 218,332 L 224,410 Z" fill="#0D47A1" stroke="#1A1A1A" stroke-width="4" stroke-linejoin="round" />
        
        <!-- Plastic specular body sheen -->
        <path d="M 183,338 L 179,403" fill="none" stroke="#FFF" stroke-width="3" opacity="0.3" stroke-linecap="round" />
        
        <!-- Neck flange spacer ring -->
        <circle cx="200" cy="328" r="14" fill="#FAF6E8" stroke="#1A1A1A" stroke-width="3.5" />
        
        <!-- Round peach face wood bead -->
        <circle cx="200" cy="298" r="28" fill="#FAF6E8" stroke="#1A1A1A" stroke-width="4.5" />
        
        <!-- Sun glare highlight -->
        <circle cx="188" cy="286" r="5" fill="#FFF" opacity="0.4" />

        <!-- Double dot eyes and red painted micro smile -->
        <circle cx="189" cy="296" r="3" fill="#111" />
        <circle cx="211" cy="296" r="3" fill="#111" />
        <path d="M 193,306 Q 200,312 207,306" fill="none" stroke="#D32F2F" stroke-width="3.5" stroke-linecap="round" />

        <!-- Molded hat/hair accessory -->
        
      <!-- Space Astronaut Bubble Visor -->
      <circle cx="200" cy="305" r="44" fill="#00E5FF" opacity="0.4" stroke="#FFFFFF" stroke-width="3" />
      <!-- White astronaut helmet back -->
      <path d="M 158,310 C 158,260 242,260 242,310 C 242,350 158,350 158,310 Z" fill="#ECEFF1" stroke="#1A1A1A" stroke-width="3" opacity="0.95" />
    
      </g>

      <!-- Label Details -->
      <g transform="translate(0, -5)">
        <rect x="25" y="475" width="350" height="1" fill="#1A1A1A" opacity="0.2" />
        <text x="200" y="495" text-anchor="middle" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="10.5" font-weight="900" fill="#00E5FF" letter-spacing="3.5px">★ TOYBOX ORIGINALS ★</text>
      </g>

      <!-- Core Title Render Overlay -->
      <g id="title-wrapper">
        <text x="200" y="55" text-anchor="middle" font-family="'Space Grotesk', 'Inter', sans-serif" font-weight="950" font-size="28" fill="#FFFFFF" stroke="#101827" stroke-width="5" paint-order="stroke fill" letter-spacing="-0.5px">THE GREAT</text><text x="200" y="85" text-anchor="middle" font-family="'Space Grotesk', 'Inter', sans-serif" font-weight="950" font-size="28" fill="#FFFFFF" stroke="#101827" stroke-width="5" paint-order="stroke fill" letter-spacing="-0.5px">BEYOND: UNDER</text><text x="200" y="115" text-anchor="middle" font-family="'Space Grotesk', 'Inter', sans-serif" font-weight="950" font-size="28" fill="#FFFFFF" stroke="#101827" stroke-width="5" paint-order="stroke fill" letter-spacing="-0.5px">THE SOFA</text>
      </g>

      <!-- Horizontal Badges -->
      <rect x="22" y="172" width="105" height="24" fill="#FAF6E8" stroke="#1A1A1A" stroke-width="3" rx="12" />
      <text x="74" y="187" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" font-weight="900" fill="#111" letter-spacing="0.5px">SCI-FI</text>

      <rect x="290" y="172" width="88" height="24" fill="#FAF6E8" stroke="#1A1A1A" stroke-width="3" rx="12" />
      <text x="334" y="187" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" font-weight="900" fill="#111" letter-spacing="0.5px">MOD# 1979</text>

      <!-- Footer print details -->
      <text x="200" y="525" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-weight="800" font-size="8.5" fill="#FFFFFF" opacity="0.6" letter-spacing="1.5px">LITTLE PEOPLE MFG CORP • 100% OFFLINE SPECIAL DECAL</text>
    </svg>
  